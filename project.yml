name: Stickies
options:
  bundleIdPrefix: com.rahulnkm
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: NO
    PRODUCT_NAME: Stickies
targets:
  Stickies:
    type: application
    platform: macOS
    sources:
      - path: Stickies
    info:
      path: Stickies/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: Stickies
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIconFile: ""
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: Stickies
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "13.0"
        NSHumanReadableCopyright: ""
        NSPrincipalClass: NSApplication
    entitlements:
      path: Stickies/Stickies.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rahulnkm.stickies
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
